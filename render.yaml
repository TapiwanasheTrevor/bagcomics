services:
  - type: web
    name: bagcomics
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /up
    disk:
      name: bagcomics-storage
      mountPath: /var/www/html/storage/app/public
      sizeGB: 10
    envVars:
      - key: APP_NAME
        value: "BAG Comics"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: bagcomics
          property: host
      - key: APP_KEY
        sync: false
      - key: FORCE_HTTPS
        value: "true"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: bagcomics-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: bagcomics-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bagcomics-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: bagcomics-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bagcomics-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bagcomics-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: in-v3.mailjet.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: hello@bagcomics.shop
      - key: MAIL_FROM_NAME
        value: "BAG Comics"
      - key: FILESYSTEM_DISK
        value: public
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: AUTH_MODEL
        value: App\Models\User
      - key: ADMIN_EMAILS
        value: admin@bagcomics.com
      - key: SESSION_DOMAIN
        value: ".bagcomics.shop"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: FILE_STORAGE_DISK
        value: public
      - key: PERSISTENT_STORAGE_PATH
        value: /var/www/html/storage/app/public

  - type: worker
    name: bagcomics-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    branch: main
    dockerCommand: php /var/www/html/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    envVars:
      - key: APP_NAME
        value: "BAG Comics"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: bagcomics-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bagcomics-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: bagcomics-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bagcomics-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bagcomics-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: in-v3.mailjet.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: hello@bagcomics.shop
      - key: MAIL_FROM_NAME
        value: "BAG Comics"
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false

databases:
  - name: bagcomics-db
    databaseName: bagcomics
    user: bagcomics_user
    plan: starter
